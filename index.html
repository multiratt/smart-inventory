<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
  <title>Smart Inventory</title>
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" font-size="42">📦</text></svg>' />
  <style>
    * { box-sizing: border-box; }
    :root{
      --bg:#f6f7fb;
      --panel:#ffffff;
      --line:#e5e7eb;
      --text:#111827;
      --muted:#6b7280;
      --accent:#3b82f6;
      --accent-soft:#eff6ff;
      --success:#10b981;
      --success-soft:#ecfdf5;
      --warn:#f59e0b;
      --warn-soft:#fffbeb;
      --danger:#ef4444;
      --danger-soft:#fef2f2;
      --soft:#f9fafb;
      --overlay:rgba(15,23,42,.45);
      --highlight:#fde68a;
      --shadow:0 10px 28px rgba(15,23,42,.06);
      --radius:14px;


      --badge-photo-bg:#eff6ff;
      --badge-photo-text:#2563eb;
      --badge-photo-border:#bfdbfe;


      --badge-scanner-bg:#f5f3ff;
      --badge-scanner-text:#7c3aed;
      --badge-scanner-border:#ddd6fe;


      --badge-import-bg:#ecfeff;
      --badge-import-text:#0f766e;
      --badge-import-border:#a5f3fc;


      --badge-found-bg:#ecfdf5;
      --badge-found-text:#059669;
      --badge-found-border:#a7f3d0;


      --badge-pending-bg:#fffbeb;
      --badge-pending-text:#d97706;
      --badge-pending-border:#fde68a;


      --badge-new-bg:#fdf2f8;
      --badge-new-text:#be185d;
      --badge-new-border:#fbcfe8;


      --badge-complete-bg:#eefdf6;
      --badge-complete-text:#047857;
      --badge-complete-border:#a7f3d0;
    }
    body.dark{
      --bg:#0f172a;
      --panel:#111827;
      --line:#1f2937;
      --text:#f8fafc;
      --muted:#94a3b8;
      --accent:#60a5fa;
      --accent-soft:#0b2440;
      --success:#34d399;
      --success-soft:#0a2c22;
      --warn:#fbbf24;
      --warn-soft:#3a2a08;
      --danger:#f87171;
      --danger-soft:#3a1010;
      --soft:#0b1220;
      --overlay:rgba(0,0,0,.72);
      --highlight:#7c4a03;
      --shadow:0 12px 30px rgba(0,0,0,.28);


      --badge-photo-bg:#0d2340;
      --badge-photo-text:#93c5fd;
      --badge-photo-border:#1d4ed8;


      --badge-scanner-bg:#21103d;
      --badge-scanner-text:#c4b5fd;
      --badge-scanner-border:#7c3aed;


      --badge-import-bg:#082f33;
      --badge-import-text:#67e8f9;
      --badge-import-border:#0891b2;


      --badge-found-bg:#08261d;
      --badge-found-text:#6ee7b7;
      --badge-found-border:#059669;


      --badge-pending-bg:#3a2a08;
      --badge-pending-text:#fcd34d;
      --badge-pending-border:#d97706;


      --badge-new-bg:#3b1025;
      --badge-new-text:#f9a8d4;
      --badge-new-border:#db2777;


      --badge-complete-bg:#08261d;
      --badge-complete-text:#86efac;
      --badge-complete-border:#10b981;
    }
    html,body{width:100%;overflow-x:hidden;}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Inter, Arial, Helvetica, sans-serif;
      min-height:100vh;
      -webkit-text-size-adjust:100%;
    }
    body.modal-open{overflow:hidden;}
    header{
      padding:12px 16px;
      border-bottom:1px solid var(--line);
      background:rgba(255,255,255,.88);
      position:sticky;
      top:0;
      z-index:40;
      backdrop-filter:blur(10px);
      box-shadow:var(--shadow);
    }
    body.dark header{background:rgba(17,24,39,.86);}
    .header-inner{
      max-width:1320px;
      margin:0 auto;
      display:grid;
      grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);
      align-items:center;
      gap:10px;
    }
    .header-left{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
      justify-content:flex-start;
    }
    .header-center{
      display:flex;
      justify-content:center;
      align-items:center;
      min-width:0;
    }
    .header-right{
      display:flex;
      align-items:center;
      justify-content:flex-end;
      gap:8px;
      flex-wrap:nowrap;
      min-width:0;
    }
    .brand{
      font-size:22px;
      font-weight:800;
      display:flex;
      align-items:center;
      gap:10px;
      line-height:1.2;
      white-space:nowrap;
      min-width:0;
    }
    .brand-status-dot{
      display:inline-block;
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--danger);
      flex:0 0 10px;
      box-shadow:0 0 0 4px rgba(239,68,68,.12);
    }
    .header-actions{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:nowrap;
    }
    .header-readonly-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:6px 16px;
      border-radius:999px;
      border:1px solid var(--warn);
      background:var(--warn-soft);
      color:var(--warn);
      font-size:12px;
      font-weight:900;
      letter-spacing:.7px;
      white-space:nowrap;
    }
    .container{
      max-width:1320px;
      margin:0 auto;
      padding:18px 16px 24px;
      width:100%;
    }
    .grid{display:grid;grid-template-columns:1fr;gap:14px;}
    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:14px;
      min-width:0;
      width:100%;
      box-shadow:var(--shadow);
      position:relative;
    }
    .section-title{
      margin:0 0 12px;
      font-size:18px;
      font-weight:800;
      line-height:1.25;
      word-break:break-word;
    }
    .page-title{
      margin:0 0 14px;
      font-size:18px;
      font-weight:800;
      line-height:1.2;
    }
    .sub{
      color:var(--muted);
      font-size:13px;
      margin-top:4px;
      word-break:break-word;
    }
    .mini{
      font-size:13px;
      color:var(--muted);
      word-break:break-word;
      overflow-wrap:anywhere;
    }
    .meta{min-width:0;}
    .meta-line{
      margin:4px 0;
      font-size:14px;
      word-break:break-word;
      overflow-wrap:anywhere;
    }
    .big-selected{
      font-size:20px;
      font-weight:800;
      line-height:1.22;
      margin-bottom:6px;
      word-break:break-word;
      overflow-wrap:anywhere;
    }
    .row{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      min-width:0;
    }
    .row.center{justify-content:center;}
    .row.badge-row{gap:6px;align-items:center;flex-wrap:wrap;margin-top:10px;}
    .col{
      display:flex;
      flex-direction:column;
      gap:10px;
      min-width:0;
    }
    select,input[type="text"],textarea,input[type="range"],input[type="search"],input[type="datetime-local"],input[type="file"],input[list]{
      width:100%;
      background:var(--panel);
      border:1px solid var(--line);
      color:var(--text);
      padding:11px 12px;
      border-radius:10px;
      outline:none;
      font-size:15px;
      min-width:0;
    }
    input:focus,select:focus,textarea:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 4px rgba(59,130,246,.10);
    }
    textarea{min-height:90px;resize:vertical;font-size:15px;}
    textarea:disabled, select:disabled, input:disabled{
      opacity:.65;background:var(--soft);cursor:not-allowed;
    }
    .small-select{
      width:180px;min-width:180px;max-width:180px;margin-left:auto;flex:0 0 180px;
    }
    .search-grid{
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      gap:8px;
      align-items:center;
      width:100%;
    }
    .search-right{
      display:flex;
      gap:8px;
      justify-content:flex-end;
      flex-wrap:nowrap;
      margin-left:auto;
      align-items:center;
    }
    .search-input-wrap{position:relative;width:100%;}
    .search-input-wrap input{padding-right:100px;}
    .search-count{
      position:absolute;
      right:12px;
      top:50%;
      transform:translateY(-50%);
      font-size:12px;
      color:var(--muted);
      pointer-events:none;
      white-space:nowrap;
    }
    button,.file-label,a.export-link{
      border:1px solid var(--line);
      background:var(--panel);
      color:var(--text);
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      font-weight:700;
      font-size:14px;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      white-space:nowrap;
      touch-action:manipulation;
      -webkit-tap-highlight-color: transparent;
      transition:.16s ease;
    }
    button:hover,.file-label:hover,a.export-link:hover{transform:translateY(-1px);}
    button.primary,.file-label.primary,a.export-link.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
    button.success{background:var(--success);color:#fff;border-color:var(--success);}
    button.warn{background:var(--warn);color:#fff;border-color:var(--warn);}
    button.danger{background:var(--danger);color:#fff;border-color:var(--danger);}
    button.soft-btn{background:var(--soft);color:var(--text);}
    button.gray-disabled{
      background:#d1d5db !important;
      color:#6b7280 !important;
      border-color:#cbd5e1 !important;
      cursor:not-allowed !important;
      pointer-events:auto;
    }
    body.dark button.gray-disabled{
      background:#374151 !important;
      color:#9ca3af !important;
      border-color:#4b5563 !important;
    }
    button.icon-btn,a.icon-link,.user-menu-btn{
      width:40px;height:40px;padding:0;font-size:18px;border:1px solid var(--line);
      background:var(--panel);color:var(--text);border-radius:10px;display:inline-flex;
      align-items:center;justify-content:center;flex:0 0 40px;text-decoration:none;
    }
    button:disabled,a.icon-link.disabled{opacity:.45;cursor:not-allowed;pointer-events:none;transform:none;}
    input[type=file]{display:none;}


    .pill{
      display:inline-flex;align-items:center;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:800;
      background:var(--soft);color:var(--text);border:1px solid var(--line);white-space:nowrap;
    }
    .pill.pending{background:var(--badge-pending-bg);color:var(--badge-pending-text);border-color:var(--badge-pending-border);}
    .pill.complete{background:var(--badge-complete-bg);color:var(--badge-complete-text);border-color:var(--badge-complete-border);}
    .pill.deleted{color:var(--danger);background:var(--danger-soft);}
    .pill.scanner{background:var(--badge-scanner-bg);color:var(--badge-scanner-text);border-color:var(--badge-scanner-border);}
    .pill.photo{background:var(--badge-photo-bg);color:var(--badge-photo-text);border-color:var(--badge-photo-border);}
    .pill.import-badge{background:var(--badge-import-bg);color:var(--badge-import-text);border-color:var(--badge-import-border);}
    .pill.wait-small{padding:2px 7px;font-size:10px;line-height:1.1;}
    .pill.locked{color:var(--danger);font-size:11px;padding:4px 8px;background:var(--danger-soft);}
    .pill.found{background:var(--badge-found-bg);color:var(--badge-found-text);border-color:var(--badge-found-border);}
    .pill.add-new{background:var(--badge-new-bg);color:var(--badge-new-text);border-color:var(--badge-new-border);}


    .thumb{
      width:84px;height:84px;object-fit:cover;border-radius:10px;border:1px solid var(--line);background:var(--soft);display:block;
    }
    .history-list,.record-list{
      display:flex;flex-direction:column;gap:10px;width:100%;min-width:0;
    }
    .history-item{
      display:grid;
      grid-template-columns:180px minmax(0,1fr);
      gap:12px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px;
      min-width:0;
      width:100%;
      cursor:default;
    }
    .sender-history-thumbs{
      display:grid;gap:8px;width:100%;min-width:0;align-content:start;justify-content:start;
    }
    .sender-history-thumbs.two{grid-template-columns:repeat(2,minmax(0,84px));}
    .sender-history-thumbs.four{grid-template-columns:repeat(2,minmax(0,84px));}
    .sender-history-thumbs .thumb{width:84px;height:84px;border-radius:8px;}
    .sender-preview-row{display:grid;gap:10px;margin-top:12px;width:100%;}
    .sender-preview-row.two{grid-template-columns:repeat(2,minmax(0,1fr));}
    .sender-preview-row.four{grid-template-columns:repeat(2,minmax(0,1fr));}
    .sender-preview-block{display:flex;flex-direction:column;gap:6px;width:100%;min-width:0;}
    .sender-preview-block .thumb{width:100%;height:180px;object-fit:cover;}


    .scanner-input{
      font-size:17px;font-weight:800;letter-spacing:.2px;height:46px;min-height:46px;
    }


    .scanner-icon-box{
      width:118px;min-height:124px;height:100%;border:1px solid var(--line);border-radius:12px;background:var(--soft);
      display:flex;align-items:center;justify-content:center;font-size:40px;flex:0 0 118px;
    }
    .receiver-card{
      display:grid;grid-template-columns:180px minmax(0,1fr);gap:12px;background:var(--panel);border:1px solid var(--line);
      border-radius:12px;padding:10px;cursor:pointer;min-width:0;
    }
    .receiver-images{
      display:grid;grid-template-columns:repeat(2,minmax(0,84px));gap:8px;align-content:start;justify-content:start;min-width:0;
    }
    .receiver-image-box{
      border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--soft);padding:6px;cursor:pointer;min-width:0;
    }
    .receiver-image-box img{
      width:100%;height:84px;object-fit:cover;display:block;border-radius:6px;background:var(--soft);
    }
    .empty{
      padding:24px;border:1px dashed var(--line);border-radius:12px;text-align:center;color:var(--muted);background:var(--panel);width:100%;
    }
    .modal{
      position:fixed;inset:0;background:var(--overlay);display:none;align-items:center;justify-content:center;padding:18px;z-index:100;overscroll-behavior:contain;
    }
    .modal.show{display:flex;}
    .modal-panel{
      width:min(1100px,100%);max-height:92vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px;min-width:0;box-shadow:var(--shadow);
    }
    .modal-head{
      display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:16px;flex-wrap:wrap;
    }
    .modal-grid{
      display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:16px;min-width:0;
    }
    .modal-image-pick{
      display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;min-width:0;
    }
    .pick-card{
      border:1px solid var(--line);border-radius:12px;overflow:hidden;cursor:pointer;background:var(--panel);position:relative;min-width:0;
    }
    .pick-card.active{border-color:var(--accent);outline:2px solid rgba(59,130,246,.18);}
    .pick-card.scanned-selected{border-color:var(--success);outline:2px solid rgba(16,185,129,.18);}
    .pick-card .image-stage{
      width:100%;height:220px;background:var(--soft);overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative;
    }
    .pick-card img{
      max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;display:block;transform-origin:center center;
    }
    .pick-card .label{
      padding:8px 10px;font-size:13px;border-top:1px solid var(--line);display:flex;justify-content:space-between;gap:8px;align-items:center;flex-wrap:wrap;
    }
    .selected-image-check{
      position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;background:var(--success);color:#fff;font-weight:800;
      display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.22);z-index:2;
    }
    .ocr-box{
      background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;min-width:0;
    }
    .scan-inline-row{
      display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:nowrap;width:100%;
    }
    .scan-inline-row select{flex:1 1 auto;min-width:0;}
    .scan-inline-row button{width:96px;min-width:96px;max-width:96px;}
    .result-summary{
      margin-top:8px;display:flex;flex-wrap:wrap;gap:12px;align-items:center;font-size:13px;
    }
    .result-summary .done{color:var(--warn);font-weight:700;}
    .candidate-list{
      display:flex;flex-direction:column;gap:8px;margin-top:12px;max-height:156px;min-height:120px;overflow-y:auto;overflow-x:hidden;padding-right:4px;
    }
    .candidate{
      background:var(--panel);border:1px solid var(--line);color:var(--text);padding:10px 12px;border-radius:10px;cursor:pointer;font-size:14px;
      display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
    }
    .candidate.selected{border-color:var(--success);background:var(--success-soft);}
    .selected-view{
      margin-top:10px;background:var(--soft);border:1px solid var(--line);padding:12px 14px;border-radius:10px;font-weight:700;word-break:break-word;overflow-wrap:anywhere;
    }
    .edit-two-col{
      display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:12px;align-items:start;
    }
    .edit-two-col textarea{
      height:64px;min-height:64px;max-height:64px;resize:none;margin-bottom:0;
    }
    .edit-label{margin-bottom:8px;}
    .scanner-result-label{font-weight:700;color:var(--muted);margin-bottom:8px;}
    .lock-note{
      color:var(--danger);font-weight:700;font-size:13px;word-break:break-word;overflow-wrap:anywhere;
    }
    .readonly-note{color:var(--muted);font-size:13px;margin-top:10px;}
    .image-preview-modal{
      position:fixed;inset:0;background:var(--overlay);display:none;align-items:center;justify-content:center;padding:20px;z-index:150;
    }
    .image-preview-modal.show{display:flex;}
    .image-preview-panel{
      width:min(1000px,100%);background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;max-height:92vh;overflow:auto;box-shadow:var(--shadow);
    }
    .image-preview-panel img{
      width:100%;max-height:80vh;object-fit:contain;background:var(--soft);border-radius:10px;border:1px solid var(--line);
    }
    .sending-status{
      margin-top:10px;font-size:13px;color:var(--warn);font-weight:700;word-break:break-word;overflow-wrap:anywhere;
    }
    mark.result-highlight{
      background:var(--highlight);color:inherit;padding:0 2px;border-radius:3px;
    }
    .collapsible-toggle{
      width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;background:transparent;border:none;padding:0;margin:0;cursor:pointer;color:var(--text);font:inherit;text-align:left;
    }
    .collapsible-body{margin-top:12px;}
    .collapsed .collapsible-body{display:none;}
    .collapse-icon{font-size:14px;color:var(--muted);}
    .hidden{display:none !important;}
    .mode-panel{display:none;}
    .mode-panel.active{display:block;}
    .pagination-bar{
      display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:8px;margin-top:14px;padding-top:10px;border-top:1px solid var(--line);width:100%;
    }
    .pagination-left,.pagination-right{
      display:flex;align-items:center;gap:8px;flex-wrap:nowrap;
    }
    .pagination-left{justify-content:flex-start;}
    .pagination-center{display:flex;justify-content:center;align-items:center;min-width:0;}
    .pagination-right{justify-content:flex-end;}
    .pagination-meta{font-size:13px;color:var(--muted);white-space:nowrap;text-align:center;}
    .pagination-bar .small-select{
      width:90px;min-width:90px;max-width:90px;margin-left:0;flex:0 0 90px;
    }
    .name-badge{
      display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);padding:10px 14px;border-radius:999px;background:var(--soft);font-weight:700;max-width:100%;overflow-wrap:anywhere;
    }
    .team-title-row{
      display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px;
    }
    .team-list{
      display:flex;flex-wrap:wrap;gap:8px;width:100%;
    }
    .team-user-btn{
      min-width:180px;min-height:40px;max-width:100%;justify-content:flex-start;padding:8px 10px;font-size:13px;gap:8px;
    }
    .role-emoji{
      font-size:16px;line-height:1;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto;
    }
    .status-dot{
      display:inline-block;width:10px;height:10px;border-radius:50%;flex:0 0 10px;
    }
    .status-green{ background:var(--success); }
    .status-red{ background:var(--danger); }
    .mobile-alert-text{

<body>
  <div id="app"></div>
  <div id="webPopupHost" class="web-popup"></div>
  <div id="dashboardColumnFilterPopupHost"></div>


  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>


  <script>
    const currentPath = window.location.pathname;
    const isSender = currentPath === '/sender';
    const isReceiver = currentPath === '/receiver' || currentPath === '/';
    const isDashboard = currentPath === '/dashboard';
    const app = document.getElementById('app');
    const dashboardColumnFilterPopupHost = document.getElementById('dashboardColumnFilterPopupHost');


    const THEME_KEY = 'theme_mode_v1';
    const DEVICE_ID_KEY = 'smart_inventory_device_id_v4';
    const RECEIVER_ID_KEY = 'receiver_device_id_v4';
    const GLOBAL_NAME_KEY = 'smart_inventory_user_name_v4';
    const SENDER_COMMENT_MODE_KEY = 'sender_comment_mode_v1';
    const CLEAN_GENERATION_KEY = 'clean_generation_v1';
    const ADMIN_RECEIVER_ID = 'receiver_admin_main';


    let serverOwnerInfoCache = {
      ok:false,
      adminReceiverId: ADMIN_RECEIVER_ID,
      adminReceiverName: '',
      adminInitialized: false,
      cleanGeneration: 0
    };


    if (!localStorage.getItem(DEVICE_ID_KEY)) {
      localStorage.setItem(DEVICE_ID_KEY, 'dev_' + Date.now() + '_' + Math.floor(Math.random() * 100000));
    }
    if (!localStorage.getItem(RECEIVER_ID_KEY)) {
      localStorage.setItem(RECEIVER_ID_KEY, 'recv_' + Date.now() + '_' + Math.floor(Math.random() * 100000));
    }
    if (!localStorage.getItem(CLEAN_GENERATION_KEY)) {
      localStorage.setItem(CLEAN_GENERATION_KEY, '0');
    }


    applyTheme(localStorage.getItem(THEME_KEY) || 'light');
    boot();


    async function boot() {
      await fetchServerOwnerInfo();
      await restoreRememberedNameIfAny();
      if (isSender) {
        document.title = 'Smart Inventory';
        renderSender();
      } else if (isDashboard) {
        document.title = 'Smart Inventory';
        renderDashboard();
      } else {
        document.title = 'Smart Inventory';
        renderReceiver();
      }
    }


    function applyTheme(mode) {
      document.body.classList.toggle('dark', mode === 'dark');
    }
    function themeIcon() {
      return document.body.classList.contains('dark') ? '☀️' : '🌙';
    }
    function refreshThemeButtons() {
      document.querySelectorAll('[data-theme-btn]').forEach(btn => btn.textContent = themeIcon());
    }
    function refreshModalOpenState() {
      const anyOpen = !!document.querySelector('.modal.show, .image-preview-modal.show');
      document.body.classList.toggle('modal-open', anyOpen);
    }
    function getDeviceId() { return localStorage.getItem(DEVICE_ID_KEY) || ''; }
    function getReceiverId() {
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') return ADMIN_RECEIVER_ID;
      return localStorage.getItem(RECEIVER_ID_KEY) || '';
    }
    function getUnifiedClientId() { return getDeviceId(); }
    function getCleanGeneration() { return Number(localStorage.getItem(CLEAN_GENERATION_KEY) || '0'); }
    function setCleanGeneration(value) { localStorage.setItem(CLEAN_GENERATION_KEY, String(Number(value || 0))); }
    function getGlobalUserName() { return normalizeStrictUserName(localStorage.getItem(GLOBAL_NAME_KEY) || ''); }
    function setGlobalUserName(name) { localStorage.setItem(GLOBAL_NAME_KEY, normalizeStrictUserName(name || '')); }
    function clearGlobalUserName() { localStorage.removeItem(GLOBAL_NAME_KEY); }
    function resetAllLocalSessions() { clearGlobalUserName(); }
    function isAdminReceiver() { return getReceiverId() === ADMIN_RECEIVER_ID; }
    function getCurrentModeForIdentity() {
      if (isSender) return 'sender';
      if (isDashboard) return 'dashboard';
      return isAdminReceiver() ? 'admin' : 'receiver';
    }
    function getFingerprint() {
      return {
        userAgent: navigator.userAgent || '',
        platform: navigator.platform || '',
        language: navigator.language || '',
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || '',
        screen: `${window.screen && window.screen.width || 0}x${window.screen && window.screen.height || 0}`
      };
    }
    async function fetchServerOwnerInfo() {
      try {
        const res = await fetch('/api/server-owner');
        const json = await res.json();
        if (json && json.ok) {
          serverOwnerInfoCache = json;
          if (typeof json.cleanGeneration !== 'undefined') setCleanGeneration(json.cleanGeneration);
        }
      } catch {}
      return serverOwnerInfoCache;
    }
    async function restoreRememberedNameIfAny() {
      try {
        const current = getGlobalUserName();
        const params = new URLSearchParams({
          deviceId: getUnifiedClientId(),
          receiverId: getReceiverId(),
          mode: getCurrentModeForIdentity()
        });
        const json = await fetchJson('/api/device-identity?' + params.toString());
        if (typeof json.cleanGeneration !== 'undefined') setCleanGeneration(json.cleanGeneration);
        if (!current && json.found && json.rememberedName) setGlobalUserName(json.rememberedName);
      } catch {}
    }
    function escapeHtml(s) {
      return String(s ?? '').replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }
    function escapeRegExp(s) {
      return String(s).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }
    function normalizeStrictUserName(raw) { return String(raw || '').trim().toUpperCase(); }
    function hasStrictUserName(raw) { return /^[A-Za-z]+$/.test(String(raw || '').trim()); }
    function normalizeFreeText(raw) { return String(raw || '').replace(/\r\n/g, '\n').replace(/\u00A0/g, ' ').trim(); }
    function hasMeaningfulText(raw) { return normalizeFreeText(raw).length > 0; }
    function normalizeSearchText(raw) { return String(raw || '').trim().toLowerCase(); }
    function highlightText(text, keyword) {
      const safeText = escapeHtml(text);
      const kw = String(keyword || '').trim();
      if (!kw) return safeText;
      const re = new RegExp(`(${escapeRegExp(kw)})`, 'ig');
      return safeText.replace(re, '<mark class="result-highlight">$1</mark>');
    }
    function formatDateTime(iso) {
      try { return new Date(iso).toLocaleString('en-GB'); } catch { return iso || '-'; }
    }
    function formatDateTimeInputLocal(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '';
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }
    function formatTimestampFileName(index) {
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}_${index}.jpg`;
    }
    function roleEmojiHtml(role) {
      if (role === 'admin') return `<span class="role-emoji" title="Admin">👑</span>`;
      if (role === 'receiver') return `<span class="role-emoji" title="Receiver">📥</span>`;
      if (role === 'all') return `<span class="role-emoji" title="Everyone">🌐</span>`;
      return `<span class="role-emoji" title="Sender">📤</span>`;
    }
    function roleLabel(role) {
      if (role === 'admin') return 'admin';
      if (role === 'receiver') return 'receiver';
      if (role === 'all') return 'everyone';
      return 'sender';
    }
    function renderThemeButton() {
      return `<button data-theme-btn class="icon-btn" title="Toggle theme">${themeIcon()}</button>`;
    }
    function bindThemeButtons() {
      document.querySelectorAll('[data-theme-btn]').forEach(btn => {
        btn.onclick = () => {
          const next = document.body.classList.contains('dark') ? 'light' : 'dark';
          localStorage.setItem(THEME_KEY, next);
          applyTheme(next);
          refreshThemeButtons();
        };
      });
    }
    function renderTypeBadge(type) {
      const t = String(type || 'photo').toLowerCase() === 'scanner' ? 'scanner' : 'photo';
      return `<span class="pill ${t}">${t === 'scanner' ? 'Scanner' : 'Photo'}</span>`;
    }
    function renderReviewedBadge(item) {
      if (!item.completed) return '';
      return `<span class="pill complete">Reviewed by ${escapeHtml(item.reviewedBy || '-')}</span>`;
    }
    function renderAddNewBadge(flag) {
      return flag ? `<span class="pill add-new">New</span>` : '';
    }
    function renderFoundBadge(item) {
      return item && item.foundInDashboard ? `<span class="pill found">Found</span>` : '';
    }
    function debounce(fn, delay = 400) {
      let timer = null;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
      };
    }
    function hasActiveTypingField() {
      const el = document.activeElement;
      if (!el) return false;
      const tag = String(el.tagName || '').toUpperCase();
      return tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';
    }
    function renderPaginationBar(prefix, state) {
      const totalPages = Math.max(1, Number(state.totalPages || 1));
      const page = Math.min(Number(state.page || 1), totalPages);
      return `
        <div class="pagination-bar">
          <div class="pagination-left">
            <button id="${prefix}PrevBtn" ${page <= 1 ? 'disabled' : ''}>Prev</button>
          </div>
          <div class="pagination-center">
            <div class="pagination-meta">Page ${page}/${totalPages}</div>
          </div>
          <div class="pagination-right">
            <button id="${prefix}NextBtn" ${page >= totalPages ? 'disabled' : ''}>Next</button>
          </div>
          <div>
            <select id="${prefix}PageSize" class="small-select">
              ${[10,20,50,100].map(size => `<option value="${size}" ${Number(state.pageSize) === size ? 'selected' : ''}>${size}/page</option>`).join('')}
            </select>
          </div>
        </div>
      `;
    }
    function bindPaginationBar(prefix, state, onChange) {
      const prevBtn = document.getElementById(`${prefix}PrevBtn`);
      const nextBtn = document.getElementById(`${prefix}NextBtn`);
      const pageSizeSel = document.getElementById(`${prefix}PageSize`);
      if (prevBtn) prevBtn.onclick = () => { if (state.page > 1) { state.page -= 1; onChange(); } };
      if (nextBtn) nextBtn.onclick = () => { if (state.page < state.totalPages) { state.page += 1; onChange(); } };
      if (pageSizeSel) pageSizeSel.onchange = () => {
        state.pageSize = Number(pageSizeSel.value);
        state.page = 1;
        onChange();
      };
    }
    function downloadBlob(blob, fileName) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1500);
    }
    async function fetchJson(url, options) {
      const res = await fetch(url, options);
      let json = null;
      try { json = await res.json(); } catch { throw new Error(`HTTP ${res.status}`); }
      if (!json || !json.ok) throw new Error((json && json.error) || 'Request failed');
      return json;
    }

      async function optimizeImageDataURL(dataURL, maxSide = 1400, quality = 0.78) {
        const img = await new Promise((resolve,reject) => {
          const i = new Image();
          i.onload = () => resolve(i);
          i.onerror = reject;
          i.src = dataURL;
        });
        let w = img.width;
        let h = img.height;
        const scale = Math.min(1, maxSide / Math.max(w, h));
        w = Math.round(w * scale);
        h = Math.round(h * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        return canvas.toDataURL('image/jpeg', quality);
      }

        const normalized = normalizeStrictUserName(raw);

        if (!json.valid) {

          return null;
        }
        if (json.duplicate) {

      function preserveSenderHistorySearchSelection() {
        const el = senderHistorySearchInput;
        if (document.activeElement === el) {
          senderHistoryFocusState = {
            id: 'senderHistorySearchInput',
            start: el.selectionStart || 0,
            end: el.selectionEnd || 0
          };
        } else {
          senderHistoryFocusState = { id: null, start: 0, end: 0 };
        }
      }
      function restoreSenderHistorySearchSelection() {
        if (!senderHistoryFocusState.id) return;
        const el = document.getElementById(senderHistoryFocusState.id);
        if (!el) return;
        el.focus();
        try { el.setSelectionRange(senderHistoryFocusState.start, senderHistoryFocusState.end); } catch {}
      }


      async function loadSenderHistory(force = false) {
        try {
          const senderName = getGlobalUserName();
          if (!senderName) {
            senderHistory.innerHTML = `<div class="empty">Please set sender name first.</div>`;
            senderHistoryPaginationWrap.innerHTML = '';
            sendHistoryTitle.textContent = 'Send History (0)';
            return;
          }


          const params = new URLSearchParams({
            page: String(senderHistoryState.page),
            pageSize: String(senderHistoryState.pageSize),
            senderName,
            search: senderHistoryState.search,
            recordType: senderHistoryState.recordType
          });


          const data = await fetchJson('/api/records?' + params.toString());
          const queryKey = params.toString();


          if (!force && data.version === senderHistoryVersion && senderHistoryLastQueryKey === queryKey) return;


          preserveSenderHistorySearchSelection();
          senderHistoryVersion = data.version || 0;
          senderHistoryLastQueryKey = queryKey;
          senderHistoryState.page = data.page || 1;
          senderHistoryState.pageSize = data.pageSize || senderHistoryState.pageSize;
          senderHistoryState.total = data.total || 0;
          senderHistoryState.totalPages = data.totalPages || 1;
          sendHistoryTitle.textContent = `Send History (${senderHistoryState.total})`;


          const mine = Array.isArray(data.items) ? data.items : [];
          senderHistory.innerHTML = mine.length ? buildSenderHistoryMarkup(mine) : `<div class="empty">No records yet.</div>`;


          senderHistoryPaginationWrap.innerHTML = renderPaginationBar('senderHistory', senderHistoryState);
          bindPaginationBar('senderHistory', senderHistoryState, () => loadSenderHistory(true));
          restoreSenderHistorySearchSelection();
        } catch (e) {
          senderHistory.innerHTML = `<div class="empty">Failed to load history: ${escapeHtml(e.message)}</div>`;
          senderHistoryPaginationWrap.innerHTML = '';

      async function submitScannerRecord(forceValue = '') {
        if (scannerSubmitting) return;
        const senderName = getGlobalUserName();
        if (!senderName) {
          senderNameRequiredModal.classList.add('show');
          refreshModalOpenState();
          return;

        const value = normalizeFreeText(forceValue || scannerInput.value);
        if (!hasMeaningfulText(value)) return;


        scannerSubmitting = true;
        const comment = await requestSenderComment();
        if (comment === null) {
          scannerSubmitting = false;
          scannerInput.focus();
          return;
        }


        sendingStatus.textContent = 'Sending...';
        scannerInput.disabled = true;


        try {
          await fetchJson('/api/upload-record', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
              senderName,
              deviceId:getUnifiedClientId(),
              recordType:'scanner',
              scannerText:value,
              comment,
              requireComment:isSenderCommentModeOn(),
              cleanGeneration:getCleanGeneration(),
              fingerprint:getFingerprint(),
              images:[]
            })
          });
          scannerInput.value = '';
          sendingStatus.textContent = 'Sent successfully.';
          senderHistoryState.page = 1;
          senderHistoryVersion = 0;
          await loadSenderHistory(true);
        } catch (e) {
          sendingStatus.textContent = 'Sending failed: ' + e.message;
        }
        scannerInput.disabled = false;
        scannerSubmitting = false;
        resetScannerMeta();
        scannerInput.focus();
      }


      function resetScannerMeta() {
        scannerBufferMeta = {
          firstTs:0,
          lastTs:0,
          keyTimes:[],
          repeatedRun:1,
          lastChar:'',
          manualInvalid:false
        };
      }


      function scannerLooksValid() {
        const value = scannerInput.value || '';
        if (value.length < 4) return false;


        const times = scannerBufferMeta.keyTimes || [];
        if (times.length < 4) return false;


        let totalGap = 0;
        let gapCount = 0;
        for (let i = 1; i < times.length; i++) {
          totalGap += (times[i] - times[i - 1]);
          gapCount += 1;
        }
        const avgGap = gapCount ? totalGap / gapCount : 999;
        const totalDuration = times[times.length - 1] - times[0];


        if (scannerBufferMeta.repeatedRun >= 4) return false;
        if (scannerBufferMeta.manualInvalid) return false;
        if (avgGap > 55) return false;
        if (totalDuration > 500) return false;


        return true;
      }


      function queueScannerValidateAndSubmit() {
        clearTimeout(scannerSubmitTimer);
        scannerSubmitTimer = setTimeout(async () => {
          if (!scannerInput.value) {
            resetScannerMeta();
            return;
          }
          if (!scannerLooksValid()) {
            scannerInput.value = '';
            resetScannerMeta();
            return;
          }
          await submitScannerRecord(scannerInput.value);
        }, 90);
      }

      scannerInput.addEventListener('keydown', async (e) => {
        if (currentSenderMode !== 'scanner') return;


        if (e.key === 'Enter') {
          e.preventDefault();
          clearTimeout(scannerSubmitTimer);
          if (scannerLooksValid()) {
            await submitScannerRecord(scannerInput.value);
          } else {
            scannerInput.value = '';
            resetScannerMeta();
          }
          return;
        }


        if ((e.ctrlKey || e.metaKey) && ['v','c','x','a'].includes(String(e.key || '').toLowerCase())) {
          e.preventDefault();
          return;
        }


        if (e.key === 'Backspace' || e.key === 'Delete') {
          scannerInput.value = '';
          resetScannerMeta();
          e.preventDefault();
          return;
        }


        if (e.key && e.key.length === 1) {
          const now = performance.now();
          const ch = e.key;
          if (!scannerBufferMeta.firstTs) scannerBufferMeta.firstTs = now;
          scannerBufferMeta.lastTs = now;
          scannerBufferMeta.keyTimes.push(now);


          if (scannerBufferMeta.lastChar === ch) scannerBufferMeta.repeatedRun += 1;
          else scannerBufferMeta.repeatedRun = 1;


          scannerBufferMeta.lastChar = ch;
        }
      });

          return;

        queueScannerValidateAndSubmit();
      });

      async function validateUniqueReceiverName(rawName) {
        const raw = String(rawName || '').trim();
        if (!raw || !hasStrictUserName(raw)) {
          showToast('Username must contain English letters only.', 'warn');
          return null;
        }
        const normalized = normalizeStrictUserName(raw);
        const json = await fetchJson('/api/check-receiver-name?name=' + encodeURIComponent(normalized) + '&receiverId=' + encodeURIComponent(getReceiverId()) + '&deviceId=' + encodeURIComponent(getUnifiedClientId()) + '&mode=' + encodeURIComponent(isAdminReceiver() ? 'admin' : 'receiver'));


        if (!json.valid) {
          showToast('Username must contain English letters only.', 'warn');
          return null;
        }
        if (json.duplicate) {
          showToast(`The receiver name "${normalized}" is already used in the system.`, 'warn');
          return null;
        }
        return json.normalized || normalized;
      }


      async function saveReceiverNameDirect(rawName, modeOverride = '') {
        const resolvedName = await validateUniqueReceiverName(rawName);
        if (!resolvedName) return false;


        const json = await fetchJson('/api/set-receiver-name', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({
            receiverId:getReceiverId(),
            deviceId:getUnifiedClientId(),
            receiverName:resolvedName,
            isAdmin:isAdminReceiver(),
            mode: modeOverride || (isAdminReceiver() ? 'admin' : 'receiver'),
            fingerprint:getFingerprint()
          })
        });


        setGlobalUserName(json.normalized || resolvedName);
        refreshReceiverProfileBadge();
        return true;
      }

      async function receiverHeartbeat() {
        const receiverName = getGlobalUserName();
        try {
          const res = await fetch('/api/receiver-heartbeat', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
              receiverId:getReceiverId(),
              deviceId:getUnifiedClientId(),
              receiverName,
              isAdmin:isAdminReceiver(),
              mode:isAdminReceiver() ? 'admin' : 'receiver',
              cleanGeneration:getCleanGeneration(),
              fingerprint:getFingerprint()
            })
          });
          const json = await res.json();


          if (typeof json.cleanGeneration !== 'undefined' && Number(json.cleanGeneration) !== getCleanGeneration()) {
            setCleanGeneration(json.cleanGeneration);
            resetAllLocalSessions();
            window.location.reload();
            return;
          }


          if (!receiverName && json.rememberedName) {
            setGlobalUserName(json.rememberedName);
            refreshReceiverProfileBadge();
            pendingDataVersion = 0;
            completedDataVersion = 0;
            await loadPendingRecords(true);
            await loadCompletedRecords(true);
          }


          if (json.deletedByAdmin) {
            clearGlobalUserName();
            receiverNameRequiredSub.textContent = 'This user was deleted by admin or the database was cleaned. Please set a name again.';
            receiverNameRequiredModal.classList.add('show');
            refreshModalOpenState();
          }
        } catch {}
      }

      async function loadTeamUsers(force = false) {
        try {
          const data = await fetchJson('/api/active-senders');
          const users = Array.isArray(data.senders) ? data.senders : [];
          const renderKey = JSON.stringify(users.map(s => ({
            id:s.id, receiverId:s.receiverId, name:s.name, role:s.role, online:s.online, waiting:s.waiting
          })));


          if (!force && data.version === teamDataVersion && teamLastKey === renderKey) return users;
          teamDataVersion = data.version || 0;
          teamLastKey = renderKey;


          if (!users.length) {
            teamListInline.innerHTML = `<div class="empty">No active users.</div>`;
            return users;
          }


          const selfName = getGlobalUserName();
          const selfRole = isAdminReceiver() ? 'admin' : 'receiver';


          teamListInline.innerHTML = users.map(s => {
            const isSelf = normalizeStrictUserName(s.name || '') === selfName && s.role === selfRole;
            return `
              <button class="team-user-btn" data-user='${encodeURIComponent(JSON.stringify(s))}'>
                <span class="status-dot ${s.online ? 'status-green' : 'status-red'}"></span>
                ${roleEmojiHtml(s.role)}
                <span>${escapeHtml(s.name)}${isSelf ? ' (you)' : ''}</span>
                ${s.waiting ? '<span class="pill pending wait-small">WAIT</span>' : ''}
              </button>
            `;
          }).join('');


          teamListInline.querySelectorAll('[data-user]').forEach(btn => {
            btn.onclick = () => {
              const raw = decodeURIComponent(btn.getAttribute('data-user') || '');
              const parsed = JSON.parse(raw);


              if (!isAdminReceiver() && parsed.role === 'receiver' && parsed.name === getGlobalUserName()) {
                showToast('You are receiver', 'warn');
                return;
              }


              if (parsed.role === 'admin') {
                activeTeamTarget = { id:'all', receiverId:'', name:'Everyone', role:'all' };
                teamTargetText.textContent = 'Send message to everyone';
                renderTeamQuickButtons();
                renderDeleteUserButton();
                freeTeamMessage.value = '';
                teamMessageModal.classList.add('show');
                refreshModalOpenState();
                return;
              }


              activeTeamTarget = parsed;
              const selfNameNow = getGlobalUserName();
              const selfRoleNow = isAdminReceiver() ? 'admin' : 'receiver';
              if (activeTeamTarget.name === selfNameNow && activeTeamTarget.role === selfRoleNow) {
                if (!isAdminReceiver()) {
                  showToast('You are receiver', 'warn');
                }
                return;
              }


              teamTargetText.textContent = `Send message to ${activeTeamTarget.name}`;
              renderTeamQuickButtons();
              renderDeleteUserButton();
              freeTeamMessage.value = '';
              teamMessageModal.classList.add('show');
              refreshModalOpenState();
            };
          });


          return users;
        } catch (e) {
          teamListInline.innerHTML = `<div class="empty">Failed to load team: ${escapeHtml(e.message)}</div>`;
          return [];
        }
      }

      async function checkReceiverAlert() {
        try {
          const receiverName = getGlobalUserName();
          if (!receiverName) return;
          const json = await fetchJson('/api/receiver-alert?receiverId=' + encodeURIComponent(getReceiverId()) + '&receiverName=' + encodeURIComponent(receiverName));


          if (json.deletedByAdmin) {
            clearGlobalUserName();
            receiverNameRequiredSub.textContent = 'This user was deleted by admin or the database was cleaned. Please set a name again.';
            receiverNameRequiredModal.classList.add('show');
            refreshModalOpenState();
            return;
          }


          if (!json.alert || !json.alert.id) return;
          if (json.alert.id === lastReceiverAlertId) return;


          lastReceiverAlertId = json.alert.id;
          lastReceiverAlertObj = json.alert;


          if (json.alert.type === 'rename-request') {
            if (isAdminReceiver()) await checkAdminRenamePopup();
            return;
          }


          receiverAlertFrom.textContent = `From: ${json.alert.fromName || 'Unknown'} (${roleLabel(json.alert.fromRole || '-')})`;
          receiverAlertText.textContent = json.alert.message || '';


          const normalized = String(json.alert.message || '').trim().toLowerCase();
          const isBroadcast = !!json.alert.broadcast;


          if (normalized === 'wait') {
            receiverAlertLocked = true;
            receiverAlertReplyBtn.style.display = 'none';
            receiverAlertOkBtn.style.display = 'none';
          } else if (normalized === 'go ahead') {
            receiverAlertLocked = false;
            receiverAlertReplyBtn.style.display = 'none';
            receiverAlertOkBtn.style.display = 'inline-flex';
          } else if (isBroadcast) {
            receiverAlertLocked = false;
            receiverAlertReplyBtn.style.display = 'none';
            receiverAlertOkBtn.style.display = 'inline-flex';
          } else {
            receiverAlertLocked = false;
            receiverAlertReplyBtn.style.display = 'inline-flex';
            receiverAlertOkBtn.style.display = 'inline-flex';
          }


          receiverAlertModal.classList.add('show');
          refreshModalOpenState();
        } catch {}
      }

      async function openMobileQrModal(forceOpen = true) {
        if (!isAdminReceiver() || !mobileQrModal || !mobileQrList) return false;
        try {
          const data = await fetchJson('/api/interfaces');
          const urls = Array.isArray(data.senderUrls) ? data.senderUrls : [];
          if (!urls.length) {
            mobileQrList.innerHTML = `<div class="empty">No interface detected.</div>`;
            if (forceOpen) {
              mobileQrModal.classList.add('show');
              refreshModalOpenState();
            }
            return false;
          }


          const cards = [];
          for (const item of urls) {
            cards.push({ title:`${item.label} - Sender`, url:item.senderUrl });
            cards.push({ title:`${item.label} - Receiver`, url:item.receiverUrl });
            cards.push({ title:`${item.label} - Dashboard (Read Only)`, url:item.dashboardUrl });
          }


          const cols = 3;
          mobileQrList.innerHTML = `<div id="qrGridWrap" style="display:grid;grid-template-columns:repeat(${cols},minmax(0,1fr));gap:12px;"></div>`;
          const wrap = document.getElementById('qrGridWrap');


          for (const item of cards) {
            const box = document.createElement('div');
            box.className = 'card';
            box.style.boxShadow = 'none';
            box.style.display = 'flex';
            box.style.flexDirection = 'column';
            box.style.alignItems = 'center';
            box.style.justifyContent = 'flex-start';
            box.style.textAlign = 'center';
            box.innerHTML = `<div><strong>${escapeHtml(item.title)}</strong></div><div class="mini" style="margin-top:6px;">${escapeHtml(item.url)}</div>`;
            const canvas = document.createElement('canvas');
            canvas.style.display = 'block';
            canvas.style.margin = '12px auto 0';
            canvas.style.width = '180px';
            canvas.style.maxWidth = '100%';
            canvas.style.height = 'auto';


            const qrWrap = document.createElement('div');
            qrWrap.style.display = 'flex';
            qrWrap.style.justifyContent = 'center';
            qrWrap.style.alignItems = 'center';
            qrWrap.style.width = '100%';
            qrWrap.style.marginTop = '10px';
            qrWrap.appendChild(canvas);


            box.appendChild(qrWrap);
            wrap.appendChild(box);
            try { await QRCode.toCanvas(canvas, item.url, { width: 180, margin: 1 }); } catch {}
          }


          if (forceOpen) {
            mobileQrModal.classList.add('show');
            refreshModalOpenState();
          }
          return true;
        } catch (e) {
          mobileQrList.innerHTML = `<div class="empty">Failed to load URLs: ${escapeHtml(e.message)}</div>`;
          if (forceOpen) {
            mobileQrModal.classList.add('show');
            refreshModalOpenState();
          }
          return false;
        }
      }

      function bindRecordCards(containerEl, sourceItems) {
        containerEl.querySelectorAll('[data-open-id]').forEach(card => {
          card.onclick = (e) => {
            if (e.target.closest('[data-preview-record]')) return;
            const id = card.getAttribute('data-open-id');
            const item = sourceItems.find(x => x.id === id);
            if (item) openModal(item);
          };
        });


        containerEl.querySelectorAll('[data-preview-record]').forEach(btn => {
          btn.onclick = async (e) => {
            e.stopPropagation();
            const recordId = btn.getAttribute('data-preview-record');
            const idx = Number(btn.getAttribute('data-preview-image') || '0');
            const item = sourceItems.find(x => x.id === recordId);
            if (!item || !item.images || !item.images[idx]) return;
            largePreviewImage.src = item.images[idx].url;
            imagePreviewModal.classList.add('show');
            refreshModalOpenState();
          };
        });
      }


      function renderReceiverCard(item, completed = false) {
        const typeBadge = renderTypeBadge(item.recordType);
        const statusBadge = completed ? renderReviewedBadge(item) : '';
        const lockBadge = !completed && item.reviewLock ? `<div class="pill locked">Locked: ${escapeHtml(item.reviewLock.receiverName || 'Unknown')}</div>` : '';
        const ownBadge = item.ownRecordBlocked ? `<div class="pill deleted">Own Record</div>` : '';
        const addNewBadge = renderAddNewBadge(item.isAddNew);
        const foundBadge = renderFoundBadge(item);


        if (item.recordType === 'scanner') {
          return `
            <div class="receiver-card" data-open-id="${item.id}">
              <div class="scanner-icon-box">📝</div>
              <div>
                <div class="big-selected">${item.selectedText ? escapeHtml(item.selectedText) : 'No selected text'}</div>
                <div class="mini">Sender: ${escapeHtml(item.senderName || 'Unknown')}</div>
                <div class="mini">Time: ${escapeHtml(formatDateTime(item.timestamp))}</div>
                ${item.comment ? `<div class="receiver-comment">Comment: ${escapeHtml(item.comment)}</div>` : ''}
                ${item.selectedSourceText && item.selectedText && item.selectedSourceText !== item.selectedText ? `<div class="mini">Override: ${escapeHtml(item.selectedSourceText)} → ${escapeHtml(item.selectedText)}</div>` : ''}
                <div class="row badge-row">${typeBadge}${addNewBadge}${foundBadge}${statusBadge}${lockBadge}${ownBadge}</div>
              </div>
            </div>
          `;
        }


        return `
          <div class="receiver-card" data-open-id="${item.id}">
            <div class="receiver-images">
              ${(item.images || []).slice(0, 4).map((img, idx) => `<div class="receiver-image-box" data-preview-record="${item.id}" data-preview-image="${idx}"><img loading="lazy" src="${img.url}" alt=""></div>`).join('')}
            </div>
            <div>
              <div class="big-selected">${item.selectedText ? escapeHtml(item.selectedText) : 'No selected text'}</div>
              <div class="mini">Sender: ${escapeHtml(item.senderName || 'Unknown')}</div>
              <div class="mini">Time: ${escapeHtml(formatDateTime(item.timestamp))}</div>
              ${item.comment ? `<div class="receiver-comment">Comment: ${escapeHtml(item.comment)}</div>` : ''}
              ${item.selectedSourceText && item.selectedText && item.selectedSourceText !== item.selectedText ? `<div class="mini">Override: ${escapeHtml(item.selectedSourceText)} → ${escapeHtml(item.selectedText)}</div>` : ''}
              <div class="row badge-row">${typeBadge}${addNewBadge}${foundBadge}${statusBadge}${lockBadge}${ownBadge}</div>
            </div>
          </div>
        `;
      }


      async function loadPendingRecords(force = false) {
        try {
          const params = new URLSearchParams({
            page:String(pendingState.page),
            pageSize:String(pendingState.pageSize),
            status:'pending',
            search:pendingState.search,
            recordType:pendingState.recordType
          });
          const focusState = preserveInputFocus(pendingSearchInput);
          const data = await fetchJson('/api/records?' + params.toString());
          const queryKey = params.toString();


          if (!force && data.version === pendingDataVersion && pendingLastQueryKey === queryKey) return;


          pendingDataVersion = data.version || 0;
          pendingLastQueryKey = queryKey;
          pendingState.page = data.page || 1;
          pendingState.pageSize = data.pageSize || pendingState.pageSize;
          pendingState.total = data.total || 0;
          pendingState.totalPages = data.totalPages || 1;


          const items = Array.isArray(data.items) ? data.items : [];
          items.forEach(item => item.ownRecordBlocked = normalizeStrictUserName(item.senderName || '') === getGlobalUserName());


          incomingRecordsTitle.textContent = `Pending Review (${pendingState.total})`;
          receiverList.innerHTML = items.length ? items.map(item => renderReceiverCard(item, false)).join('') : `<div class="empty">No pending review records.</div>`;
          bindRecordCards(receiverList, items);


          pendingPaginationWrap.innerHTML = renderPaginationBar('pending', pendingState);
          bindPaginationBar('pending', pendingState, () => loadPendingRecords(true));
          restoreInputFocus(pendingSearchInput, focusState);
        } catch (e) {
          receiverList.innerHTML = `<div class="empty">Failed to load receiver list: ${escapeHtml(e.message)}</div>`;

      }

      function resetScanStateForModal() {
        imageResultsByIndex = [];
        scannedZeroResultImages = new Set();
        selectedImageIndexForCurrentResult = null;
      }
      function hasSelectedResultForCurrentImage() {
        return selectedImageIndexForCurrentResult === currentSelectedImageIndex && hasMeaningfulText(selectedTextEditor.value);
      }
      function wasCurrentImageScannedWithZeroResult() { return scannedZeroResultImages.has(currentSelectedImageIndex); }
      function isOwnRecordBlocked() { return !!(currentModalRecord && currentModalRecord.ownRecordBlocked); }
      function canEditCurrentPhotoRecord() {
        if (!currentModalRecord) return false;
        if (currentModalRecord.completed) return false;
        if (isOwnRecordBlocked()) return false;
        if (hasSelectedResultForCurrentImage()) return true;
        if (wasCurrentImageScannedWithZeroResult()) return true;
        return false;
      }


      function refreshPhotoEditState() {
        if (!currentModalRecord) return;


        const editable = canEditCurrentPhotoRecord();
        selectedTextEditor.disabled = !editable;
        selectedCommentEditor.disabled = !editable;


        if (currentModalRecord.completed) {
          scanBtn.disabled = true;
          scanModeSelect.disabled = true;
          resultSearchInput.disabled = true;
          recordReadonlyNote.textContent = 'This completed record is read-only. You can only revert it.';
          saveSelectedTextBtn.textContent = 'Revert this record';
          saveSelectedTextBtn.className = 'warn';
        } else if (isOwnRecordBlocked()) {
          scanBtn.disabled = true;
          scanModeSelect.disabled = true;
          resultSearchInput.disabled = true;
          selectedTextEditor.disabled = true;
          selectedCommentEditor.disabled = true;
          recordReadonlyNote.textContent = 'You cannot review your own submitted record.';
          saveSelectedTextBtn.textContent = 'Complete this record';
          saveSelectedTextBtn.className = 'success';
          saveSelectedTextBtn.disabled = true;
        } else {
          scanBtn.disabled = false;
          scanModeSelect.disabled = false;
          resultSearchInput.disabled = false;
          saveSelectedTextBtn.disabled = false;
          saveSelectedTextBtn.textContent = 'Complete this record';
          saveSelectedTextBtn.className = 'success';


          if (hasSelectedResultForCurrentImage()) {
            recordReadonlyNote.textContent = 'Selected result ready. Edit text and comment.';
          } else if (wasCurrentImageScannedWithZeroResult()) {
            recordReadonlyNote.textContent = 'No result found. Manual typing allowed.';
          } else {
            recordReadonlyNote.textContent = 'Scan first. Auto-select if found, otherwise type manually.';
          }
        }
      }

        if (!currentModalRecord) return;
        if (currentModalRecord.completed) {

          scannerCommentEditor.disabled = true;
          scannerSaveSelectedTextBtn.disabled = false;

          scannerReadonlyNote.textContent = 'This completed record is read-only. You can only revert it.';
        } else if (isOwnRecordBlocked()) {

          scannerCommentEditor.disabled = true;
          scannerSaveSelectedTextBtn.disabled = true;
          scannerSaveSelectedTextBtn.textContent = 'Complete this record';

          scannerReadonlyNote.textContent = 'You cannot review your own submitted record.';
        } else {
          scannerSelectedTextEditor.disabled = false;
          scannerCommentEditor.disabled = false;
          scannerSaveSelectedTextBtn.disabled = false;
          scannerSaveSelectedTextBtn.textContent = 'Complete this record';
          scannerSaveSelectedTextBtn.className = 'success';
          scannerReadonlyNote.textContent = 'Edit selected text and comment before completing.';

      function refreshImagePickSelection() {
        if (!currentModalRecord || currentModalRecord.recordType !== 'photo') return;
        const images = Array.isArray(currentModalRecord.images) ? currentModalRecord.images : [];


        modalImagePick.innerHTML = images.map((img, idx) => {
          const active = idx === currentSelectedImageIndex;
          const selectedFromThisImage = selectedImageIndexForCurrentResult === idx;
          return `
            <div class="pick-card ${active ? 'active' : ''} ${selectedFromThisImage ? 'scanned-selected' : ''}" data-pick-index="${idx}">
              <div class="image-stage">
                <img src="${img.url}" alt="">
                ${selectedFromThisImage ? '<div class="selected-image-check">✓</div>' : ''}
              </div>
              <div class="label">
                <span>${escapeHtml(img.name || 'Image')}</span>
                <span><button type="button" data-large-preview="${idx}">Preview</button></span>
              </div>
            </div>
          `;
        }).join('');


        modalImagePick.querySelectorAll('[data-pick-index]').forEach(el => {
          el.onclick = (e) => {
            if (e.target.closest('[data-large-preview]')) return;
            currentSelectedImageIndex = Number(el.getAttribute('data-pick-index'));
            refreshImagePickSelection();
            renderCandidateResults(imageResultsByIndex[currentSelectedImageIndex] || [], selectedImageIndexForCurrentResult === currentSelectedImageIndex ? normalizeFreeText(selectedTextEditor.value) : '');
            modalSelected.textContent = `Selected: ${selectedImageIndexForCurrentResult === currentSelectedImageIndex ? (selectedTextEditor.value || 'none') : 'none'}`;
            if (!currentModalRecord.completed && !isOwnRecordBlocked()) {
              if (selectedImageIndexForCurrentResult !== currentSelectedImageIndex && !wasCurrentImageScannedWithZeroResult()) selectedTextEditor.value = '';
            }
            refreshPhotoEditState();
          };
        });


        modalImagePick.querySelectorAll('[data-large-preview]').forEach(el => {
          el.onclick = (e) => {
            e.stopPropagation();
            const idx = Number(el.getAttribute('data-large-preview'));

          if (full.recordType === 'scanner') {
            photoDetailLayout.classList.add('hidden');
            scannerDetailLayout.classList.remove('hidden');
            scannerDetailText.textContent = full.selectedText || full.selectedSourceText || 'Scanned text: none';
            scannerSelectedTextEditor.value = full.selectedText || '';
            scannerCommentEditor.value = full.comment || '';
            lockInfo.textContent = full.reviewLock ? `Locked by ${full.reviewLock.receiverName}` : '';
            refreshScannerEditState();
            editBox.style.display = 'none';
          } else {
            scannerDetailLayout.classList.add('hidden');
            photoDetailLayout.classList.remove('hidden');


            selectedTextEditor.value = full.completed ? (full.selectedText || '') : '';
            selectedCommentEditor.value = full.comment || '';

      scannerSaveSelectedTextBtn.onclick = async () => {

          revertConfirmModal.classList.add('show');

        try {

            await loadLogs(true);

      saveSelectedTextBtn.onclick = async () => {

          revertConfirmModal.classList.add('show');
          refreshModalOpenState();
          confirmRevertBtn.onclick = async () => {

            await loadLogs(true);
          }
        } catch (e) {
          showToast('Save failed: ' + e.message, 'danger');

      scanBtn.onclick = async () => {
        if (!currentModalRecord || currentModalRecord.recordType !== 'photo' || currentModalRecord.completed || isOwnRecordBlocked()) return;
        const img = (currentModalRecord.images || [])[currentSelectedImageIndex];
        if (!img) return;


        resultCompletedInfo.textContent = 'Scanning...';
        modalCandidates.innerHTML = '';
        resultCountInfo.textContent = '';
        selectedImageIndexForCurrentResult = null;
        scannedZeroResultImages.delete(currentSelectedImageIndex);
        modalSelected.textContent = 'Selected: none';
        selectedTextEditor.value = '';
        refreshImagePickSelection();
        refreshPhotoEditState();


        try {
          const image = await new Promise((resolve, reject) => {
            const i = new Image();
            i.onload = () => resolve(i);
            i.onerror = reject;
            i.src = img.url;
          });


          const canvas = document.createElement('canvas');
          canvas.width = image.naturalWidth || image.width;
          canvas.height = image.naturalHeight || image.height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(image, 0, 0);


          const results = [];
          const mode = scanModeSelect.value;


          if (mode === 'all' || mode === 'code') {
            try {
              const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
              const qr = jsQR(imageData.data, imageData.width, imageData.height);
              if (qr && qr.data) results.push(qr.data);
            } catch {}


            try {
              const codeReader = new ZXing.BrowserMultiFormatReader();
              const decoded = await codeReader.decodeFromImageElement(image);
              if (decoded && decoded.text) results.push(decoded.text);
            } catch {}
          }


          if (!results.length && (mode === 'all' || mode === 'ocr')) {
            try {
              const ocr = await Tesseract.recognize(canvas, 'eng');
              const text = normalizeFreeText((ocr && ocr.data && ocr.data.text) || '');
              if (text) text.split('\n').map(x => normalizeFreeText(x)).filter(Boolean).forEach(x => results.push(x));
            } catch {}
          }


          const unique = [...new Set(results.map(x => normalizeFreeText(x)).filter(Boolean))];
          imageResultsByIndex[currentSelectedImageIndex] = unique;


          if (!unique.length) {
            scannedZeroResultImages.add(currentSelectedImageIndex);
            modalCandidates.innerHTML = `<div class="empty">No results.</div>`;
            modalSelected.textContent = 'Selected: none';
            resultCompletedInfo.textContent = 'No results';
            resultCountInfo.textContent = '0 result(s)';
            refreshPhotoEditState();
            refreshImagePickSelection();
            return;
          }


          const autoSelected = unique[0];
          selectedImageIndexForCurrentResult = currentSelectedImageIndex;
          selectedTextEditor.value = autoSelected;
          modalSelected.textContent = `Selected: ${autoSelected}`;
          renderCandidateResults(unique, autoSelected);
          resultCompletedInfo.textContent = 'Completed';
          resultCountInfo.textContent = `${unique.length} result(s)`;
          refreshPhotoEditState();
          refreshImagePickSelection();
        } catch (e) {
          resultCompletedInfo.textContent = 'Scan failed';
          resultCountInfo.textContent = e.message || '';
        }
      };


      function renderCandidateResults(items, selectedValue = '') {
        const keyword = normalizeSearchText(resultSearchInput.value);
        const filtered = (items || []).filter(x => !keyword || normalizeSearchText(x).includes(keyword));
        if (!filtered.length) {
          modalCandidates.innerHTML = `<div class="empty">No results.</div>`;
          return;
        }
        modalCandidates.innerHTML = filtered.map(text => `
          <div class="candidate ${text === selectedValue ? 'selected' : ''}" data-candidate-text="${encodeURIComponent(text)}">
            <div>${highlightText(text, keyword)}</div>
          </div>
        `).join('');


        modalCandidates.querySelectorAll('[data-candidate-text]').forEach(el => {
          el.onclick = () => {
            if (currentModalRecord && (currentModalRecord.completed || isOwnRecordBlocked())) return;
            const text = decodeURIComponent(el.getAttribute('data-candidate-text') || '');
            selectedImageIndexForCurrentResult = currentSelectedImageIndex;
            scannedZeroResultImages.delete(currentSelectedImageIndex);
            selectedTextEditor.value = text;
            modalSelected.textContent = `Selected: ${text}`;
            [...modalCandidates.querySelectorAll('.candidate')].forEach(x => x.classList.remove('selected'));
            el.classList.add('selected');
            refreshPhotoEditState();
            refreshImagePickSelection();
          };
        });
      }


      resultSearchInput.oninput = () => {
        const selectedValue = selectedImageIndexForCurrentResult === currentSelectedImageIndex ? normalizeFreeText(selectedTextEditor.value) : '';
        renderCandidateResults(imageResultsByIndex[currentSelectedImageIndex] || [], selectedValue);
      };

        revertConfirmModal.classList.remove('show');
        refreshModalOpenState();
      };

      (async () => {

      async function ensureDashboardAdminName() {

      async function startDashboardExport(mode) {
        try {
          const res = await fetch('/api/dashboard/export?mode=' + encodeURIComponent(mode));
          if (!res.ok) throw new Error('Export failed');
          const blob = await res.blob();
          const disposition = res.headers.get('Content-Disposition') || '';
          const match = /filename="([^"]+)"/i.exec(disposition);
          downloadBlob(blob, match ? match[1] : 'dashboard_export.xlsx');
          dashboardExportModal.classList.remove('show');
          refreshModalOpenState();
        } catch (e) {
          showToast('Export failed: ' + e.message, 'danger');
        }
      }

        dashboardState.accessMode = data.accessMode || dashboardState.accessMode || 'readonly';
        applyDashboardHeaderAccessMode();
        if (!force && dashboardState.meta && dashboardState.meta.version === data.version) return dashboardState.meta;
        dashboardState.meta = data;
        return data;
      }


      async function loadDashboardSummary(force = false) {
        const data = await fetchJson('/api/dashboard/summary');
        dashboardState.accessMode = data.accessMode || dashboardState.accessMode || 'readonly';
        applyDashboardHeaderAccessMode();
        if (!force && dashboardState.summary && dashboardState.summary.version === data.version) return dashboardState.summary;
        dashboardState.summary = data;
        return data;
      }


      async function loadDashboardRows(force = false) {
        const params = new URLSearchParams({
          page:String(dashboardState.page),
          pageSize:String(dashboardState.pageSize),
          search:dashboardState.search,
          sortBy:dashboardState.sortBy,
          sortDir:dashboardState.sortDir,
          status:dashboardState.status,
          recordType:dashboardState.recordType,
          filters: JSON.stringify(dashboardState.filters || {})
        });
        const data = await fetchJson('/api/dashboard/rows?' + params.toString());
        dashboardState.accessMode = data.accessMode || dashboardState.accessMode || 'readonly';
        applyDashboardHeaderAccessMode();


        if (!force && dashboardState.renderedRowsVersion && dashboardState.renderedRowsVersion === String(data.version || '')) return;


        dashboardState.rows = data.items || [];
        dashboardState.page = data.page || 1;
        dashboardState.pageSize = data.pageSize || dashboardState.pageSize;
        dashboardState.total = data.total || 0;
        dashboardState.totalPages = data.totalPages || 1;
        dashboardState.renderedRowsVersion = String(data.version || '');


        dashboardState.countLabel = dashboardState.search
          ? `${dashboardState.total} found`
          : `${dashboardState.total} rows`;
      }


      function getVisibleColumns() {
        const settings = dashboardState.summary && dashboardState.summary.settings;
        return settings && Array.isArray(settings.visibleColumns) ? settings.visibleColumns.slice(0, 10) : [];

        if (dashboardState.sortBy !== key) return '↕';
        return dashboardState.sortDir === 'asc' ? '↑' : '↓';

      function dashboardStatusBadge(status, isAddNew) {
        if (isAddNew || status === 'new') return `<span class="dash-status-badge new">NEW</span>`;

        return `<span class="dash-status-badge pending">PENDING</span>`;

        return `<span class="dash-origin-badge photo">PHOTO</span>`;
      }
