<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
  <title>Smart Inventory</title>
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" font-size="42">📦</text></svg>' />

  <!-- CSS: split into modules -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/sender.css" />
  <link rel="stylesheet" href="css/receiver.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
</head>
<body>
  <div id="app"></div>
  <div id="dashboardColumnFilterPopupHost"></div>

  <!-- Page detection globals (must be before module scripts) -->
  <script>
    window.__PAGE__ = window.location.pathname;
    window.__IS_SENDER__    = window.__PAGE__ === '/sender';
    window.__IS_RECEIVER__  = window.__PAGE__ === '/receiver' || window.__PAGE__ === '/';
    window.__IS_DASHBOARD__ = window.__PAGE__ === '/dashboard';
  </script>

  <!-- ES6 Modules: load order matters -->
  <script type="module">
    import { initSender }    from './js/pages/sender.js';
    import { initReceiver }   from './js/pages/receiver.js';
    import { initDashboard }  from './js/pages/dashboard.js';

    const page = window.__PAGE__;
    if      (page === '/sender')    initSender();
    else if (page === '/dashboard') initDashboard();
    else                            initReceiver(); // '/' or '/receiver'
  </script>
</body>
</html>
